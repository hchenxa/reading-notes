<script>
document.addEventListener('DOMContentLoaded', function() {
  var sidebar = document.querySelector('.side-bar');
  var main = document.querySelector('.main');
  if (!sidebar || !main || window.innerWidth < 1064) return;

  var handle = document.createElement('div');
  handle.className = 'sidebar-resize-handle';
  sidebar.appendChild(handle);

  var saved = localStorage.getItem('sidebar-width');
  if (saved) {
    sidebar.style.width = saved + 'px';
    main.style.marginLeft = saved + 'px';
  }

  var startX, startW;

  handle.addEventListener('mousedown', function(e) {
    startX = e.clientX;
    startW = sidebar.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';

    function onMove(e) {
      var w = Math.min(500, Math.max(200, startW + e.clientX - startX));
      sidebar.style.width = w + 'px';
      main.style.marginLeft = w + 'px';
    }

    function onUp() {
      handle.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      localStorage.setItem('sidebar-width', sidebar.offsetWidth);
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
    e.preventDefault();
  });
});
</script>
